<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Open Graph / Discord Embed Tags -->
    <meta property="og:title" content="Oxide staff book" />
    <meta property="og:description" content="https://oxide-staff-bookvv.netlify.app/embed.png" />
    <meta property="og:image" content="https://oxide-staff-bookvv.netlify.app/embed.png" />
    <meta property="og:url" content="https://oxide-staff-bookvv.netlify.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Oxide Staff" />
    <meta name="theme-color" content="#560108" />
    
    <!-- Redirect to main page after 2 seconds -->
    <meta http-equiv="refresh" content="2;url=https://oxide-staff-bookvv.netlify.app/index.html">
    
    <title>Staff Book Acknowledgment</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            text-align: center;
        }
        
        .container {
            padding: 50px 60px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
        }
        
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff00ff, #8b00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #b8b8d4;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .loader {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #ff00ff;
            animation: spin 1s ease-in-out infinite;
            margin: 10px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .redirect-text {
            color: #888;
            font-size: 14px;
            margin-top: 20px;
        }
        
        .redirect-text a {
            color: #ff00ff;
            text-decoration: none;
        }
        
        .redirect-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📋</div>
        <h1>Staff Book Acknowledgment</h1>
        <p class="subtitle">Oxide Staff Verification Portal</p>
        
        <div class="loader"></div>
        
        <p style="margin-top: 20px; color: #d4d4f7;">Redirecting to acknowledgment page...</p>
        
        <p class="redirect-text">
            If you are not redirected automatically, 
            <a href="https://oxide-staff-bookvv.netlify.app/index.html">click here</a>
        </p>
    </div>
</body>
</html>
